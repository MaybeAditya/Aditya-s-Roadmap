<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CP Roadmap — Beginner to Grandmaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d47;
    --text: #ccd6f6;
    --text-dim: #6b7fa3;
    --text-muted: #3d4f6e;
    --green: #00ff87;
    --green-dim: #00c46b;
    --amber: #ffc857;
    --orange: #ff8c42;
    --red: #ff4d6d;
    --blue: #4fc3f7;
    --purple: #c084fc;
    --glow-green: 0 0 20px rgba(0,255,135,0.15);
    --glow-amber: 0 0 20px rgba(255,200,87,0.15);
    --glow-red: 0 0 20px rgba(255,77,109,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,135,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,135,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,14,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo .bracket { color: var(--green); }
  .logo .title { color: var(--text); }

  .phase-tabs {
    display: flex;
    gap: 4px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .phase-tabs::-webkit-scrollbar { display: none; }

  .phase-tab {
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    background: transparent;
    color: var(--text-dim);
  }
  .phase-tab:hover { background: var(--surface); color: var(--text); }
  .phase-tab.active.p1 { background: rgba(0,255,135,0.1); border-color: var(--green); color: var(--green); }
  .phase-tab.active.p2 { background: rgba(255,200,87,0.1); border-color: var(--amber); color: var(--amber); }
  .phase-tab.active.p3 { background: rgba(255,77,109,0.1); border-color: var(--red); color: var(--red); }

  .header-stats {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
  .stat-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .stat-dot.amber { background: var(--amber); }
  .stat-dot.red { background: var(--red); }

  /* LAYOUT */
  .layout {
    display: flex;
    padding-top: 60px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    height: calc(100vh - 60px);
    position: sticky;
    top: 60px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    padding: 16px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-phase {
    margin-bottom: 8px;
  }

  .sidebar-phase-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.2s;
  }
  .sidebar-phase-header:hover { color: var(--text-dim); }
  .sidebar-phase-header .phase-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }

  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 16px 5px 24px;
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    margin-left: 8px;
    line-height: 1.4;
  }
  .sidebar-link:hover { color: var(--text); background: var(--surface); }
  .sidebar-link.active { color: var(--green); border-left-color: var(--green); background: rgba(0,255,135,0.05); }

  .sidebar-link .progress-mini {
    margin-left: auto;
    font-size: 9px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .sidebar-level-label {
    padding: 4px 16px 2px 24px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-left: 8px;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    padding: 32px 40px;
    max-width: 900px;
  }

  /* PHASE SECTION */
  .phase-section { display: none; }
  .phase-section.active { display: block; }

  .phase-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .phase-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .phase-badge.p1 { background: rgba(0,255,135,0.1); color: var(--green); border: 1px solid rgba(0,255,135,0.3); }
  .phase-badge.p2 { background: rgba(255,200,87,0.1); color: var(--amber); border: 1px solid rgba(255,200,87,0.3); }
  .phase-badge.p3 { background: rgba(255,77,109,0.1); color: var(--red); border: 1px solid rgba(255,77,109,0.3); }

  .phase-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .phase-desc {
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.6;
    max-width: 600px;
  }

  /* LEVEL BLOCK */
  .level-block { margin-bottom: 40px; }

  .level-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding: 14px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .level-header::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .level-header.p1::before { background: var(--green); }
  .level-header.p2::before { background: var(--amber); }
  .level-header.p3::before { background: var(--red); }

  .level-number {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .level-number.p1 { background: rgba(0,255,135,0.1); color: var(--green); }
  .level-number.p2 { background: rgba(255,200,87,0.1); color: var(--amber); }
  .level-number.p3 { background: rgba(255,77,109,0.1); color: var(--red); }

  .level-info { flex: 1; }
  .level-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .level-rating {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .level-progress-wrap { display: flex; align-items: center; gap: 10px; }
  .level-progress-bar {
    width: 100px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .level-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .p1 .level-progress-fill { background: var(--green); }
  .p2 .level-progress-fill { background: var(--amber); }
  .p3 .level-progress-fill { background: var(--red); }
  .level-progress-text { font-size: 10px; color: var(--text-dim); white-space: nowrap; }

  /* SECTION CARD */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .section-card:hover { border-color: #2a3d5a; }

  .section-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    transition: background 0.15s;
  }
  .section-card-header:hover { background: #1f2d40; }

  .section-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .section-icon.p1 { background: rgba(0,255,135,0.1); }
  .section-icon.p2 { background: rgba(255,200,87,0.1); }
  .section-icon.p3 { background: rgba(255,77,109,0.1); }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .section-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-progress-bar {
    width: 60px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .section-progress-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--green);
    transition: width 0.3s;
  }

  .section-count { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

  .chevron {
    color: var(--text-muted);
    transition: transform 0.2s;
    font-size: 10px;
  }
  .section-card.open .chevron { transform: rotate(180deg); }

  .section-body {
    display: none;
    padding: 20px;
    border-top: 1px solid var(--border);
  }
  .section-card.open .section-body { display: block; }

  /* RESOURCES */
  .resources-block {
    margin-bottom: 20px;
  }
  .block-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .block-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .resource-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(30,45,71,0.5);
  }
  .resource-item:last-child { border-bottom: none; }
  .resource-bullet { color: var(--blue); font-size: 10px; margin-top: 3px; flex-shrink: 0; }
  .resource-link {
    color: var(--blue);
    text-decoration: none;
    font-size: 11.5px;
    line-height: 1.5;
    word-break: break-all;
    transition: color 0.15s;
  }
  .resource-link:hover { color: #81d4fa; text-decoration: underline; }

  /* TASKS */
  .tasks-block { margin-bottom: 20px; }
  .tasks-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
    transition: all 0.15s;
    cursor: pointer;
  }
  .task-item:hover { background: var(--surface2); border-color: var(--border); }
  .task-item.done { opacity: 0.5; }
  .task-item.done .task-link { text-decoration: line-through; color: var(--text-muted); }

  .task-checkbox {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    cursor: pointer;
    font-size: 9px;
    color: transparent;
  }
  .task-item.done .task-checkbox {
    background: var(--green);
    border-color: var(--green);
    color: #000;
    box-shadow: 0 0 8px rgba(0,255,135,0.3);
  }

  .task-label {
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .task-link {
    color: var(--text);
    text-decoration: none;
    font-size: 11.5px;
    flex: 1;
    word-break: break-all;
    transition: color 0.15s;
  }
  .task-link:hover { color: var(--green); }

  .task-platform {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .plat-cf { background: rgba(255,141,0,0.1); color: #ff8d00; }
  .plat-lc { background: rgba(255,161,22,0.1); color: #ffa116; }
  .plat-cses { background: rgba(100,181,246,0.1); color: #64b5f6; }
  .plat-atcoder { background: rgba(192,192,192,0.1); color: #c0c0c0; }
  .plat-spoj { background: rgba(134,239,172,0.1); color: #86efac; }
  .plat-gfg { background: rgba(168,85,247,0.1); color: #a855f7; }
  .plat-other { background: rgba(107,127,163,0.1); color: var(--text-dim); }

  /* NOTES */
  .notes-block { }
  .notes-textarea {
    width: 100%;
    min-height: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  .notes-textarea::placeholder { color: var(--text-muted); }
  .notes-textarea:focus { border-color: rgba(0,255,135,0.3); box-shadow: 0 0 0 2px rgba(0,255,135,0.05); }

  .notes-saved-indicator {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 4px;
    text-align: right;
    height: 12px;
    transition: opacity 0.3s;
  }
  .notes-saved-indicator.show { color: var(--green); }

  /* SEARCH BAR */
  .search-wrap {
    position: relative;
    margin-bottom: 24px;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 12px 10px 36px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: rgba(0,255,135,0.4); }
  .search-input::placeholder { color: var(--text-muted); }

  /* PROGRESS OVERVIEW */
  .overview-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .overview-card {
    flex: 1;
    min-width: 150px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .overview-card .ov-label { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; }
  .overview-card .ov-value {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }
  .ov-value.p1 { color: var(--green); }
  .ov-value.p2 { color: var(--amber); }
  .ov-value.p3 { color: var(--red); }
  .ov-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .ov-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .ov-bar-fill.p1 { background: var(--green); }
  .ov-bar-fill.p2 { background: var(--amber); }
  .ov-bar-fill.p3 { background: var(--red); }

  /* NOTICE / TIP BOX */
  .tip-box {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 11.5px;
    line-height: 1.6;
    border-left: 3px solid;
  }
  .tip-box.green { background: rgba(0,255,135,0.05); border-color: var(--green); color: var(--text-dim); }
  .tip-box.amber { background: rgba(255,200,87,0.05); border-color: var(--amber); color: var(--text-dim); }
  .tip-box.red { background: rgba(255,77,109,0.05); border-color: var(--red); color: var(--text-dim); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #2a3d5a; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 20px 16px; }
    .phase-title { font-size: 22px; }
  }

  .expand-all-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 16px;
  }
  .expand-all-btn:hover { color: var(--text); border-color: #2a3d5a; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="bracket">{</span>
    <span class="title">CP Roadmap</span>
    <span class="bracket">}</span>
  </div>
  <div class="phase-tabs">
    <button class="phase-tab p1 active" onclick="showPhase('p1')">Phase 1 — Foundations</button>
    <button class="phase-tab p2" onclick="showPhase('p2')">Phase 2 — Expert → CM+</button>
    <button class="phase-tab p3" onclick="showPhase('p3')">Phase 3 — CM → GM+</button>
  </div>
  <div class="header-stats">
    <div class="stat-item"><div class="stat-dot green"></div><span id="stat-done">0</span> done</div>
    <div class="stat-item"><div class="stat-dot amber"></div><span id="stat-total">0</span> total</div>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main-content"></main>
</div>

<script>
// ============================================================
// DATA
// ============================================================

const PHASES = [
  {
    id: 'p1',
    name: 'Phase 1 — Foundations',
    title: 'Beginner to Expert',
    rating: '~800 → 1800',
    desc: 'C++ fundamentals, STL, recursion, DP, greedy algorithms, binary search, segment trees, and trees. Complete all sections before moving to Phase 2.',
    color: 'green',
    levels: [
      {
        name: 'C++ & Problem Solving Basics',
        rating: '800 → 1200',
        sections: [
          {
            id: 'cpp-basics-1',
            icon: '⚙️',
            title: 'C++ Basics 1',
            resources: [
              { name: 'Lecture slides 1.1 C++ Basics 1', url: 'https://drive.google.com/file/d/1wRiGozqal1s7YD0dH88dmS2ZNUR2Kqp1/view' },
              { name: 'C++ Basics 1.1 Feedback Form', url: 'https://forms.gle/p2DtZzQuQ2xmutae8' },
              { name: 'Lecture Slides 1.1 Introduction to Online Judges', url: 'https://drive.google.com/file/d/1s9IQzo11vRofExgv5dkNdWcwLjoGNqnP/view' },
              { name: 'Introduction to Online Judges Feedback Form', url: 'https://forms.gle/A3dohxG5ZjnnCcuT9' },
            ],
            tasks: [
              { label: 'Task 1', url: 'https://codeforces.com/group/MWSDmqGsZm/contest/219158/problem/J' },
              { label: 'Task 2', url: 'https://codeforces.com/group/MWSDmqGsZm/contest/219158/problem/T' },
              { label: 'Task 3', url: 'https://codeforces.com/group/MWSDmqGsZm/contest/219158/problem/F' },
              { label: 'Task 4', url: 'https://codeforces.com/group/MWSDmqGsZm/contest/326907/problem/D' },
              { label: 'Task 5', url: 'https://codeforces.com/problemset/problem/4/A' },
              { label: 'Task 6', url: 'https://codeforces.com/group/MWSDmqGsZm/contest/219158/problem/G' },
              { label: 'Task 7', url: 'https://codeforces.com/group/MWSDmqGsZm/contest/219158/problem/I' },
              { label: 'Task 8', url: 'https://codeforces.com/group/MWSDmqGsZm/contest/219158/problem/K' },

              { name: 'Codeforces blog — How GMs think about problems', url: 'https://codeforces.com/blog/entry/92248' },
              { name: 'tourist\'s GitHub templates', url: 'https://github.com/the-tourist/algo' },
              { name: 'KACTL team notebook', url: 'https://github.com/kth-competitive-programming/kactl' },
              { name: 'Book — "How to Solve It" (Polya)', url: 'https://press.princeton.edu/books/paperback/9780691164076/how-to-solve-it' },
              { name: 'Book — "Competitive Programming 4" (Halim)', url: 'https://cpbook.net/' },
            ],
            tasks: [
              { label: 'Task 1', url: 'https://codeforces.com/problemset/problem/1603/F' },
              { label: 'Task 2', url: 'https://codeforces.com/problemset/problem/1473/G' },
              { label: 'Task 3', url: 'https://codeforces.com/problemset/problem/1511/I' },
              { label: 'Task 4', url: 'https://codeforces.com/problemset/problem/1515/H' },
              { label: 'Task 5', url: 'https://codeforces.com/problemset/problem/1868/G' },
              { label: 'Task 6', url: 'https://atcoder.jp/contests/agc005/tasks/agc005_f' },
              { label: 'Task 7', url: 'https://atcoder.jp/contests/agc006/tasks/agc006_f' },
              { label: 'Task 8', url: 'https://atcoder.jp/contests/agc008/tasks/agc008_f' },
              { label: 'Task 9', url: 'https://atcoder.jp/contests/agc032/tasks/agc032_f' },
              { label: 'Task 10', url: 'https://oj.uz/problem/view/IOI14_game' },
            ]
          },
        ]
      },
    ]
  }
];

// ============================================================
// STORAGE HELPERS
// ============================================================
function getKey(type, id) { return `cp_roadmap_${type}_${id}`; }
function isDone(taskId) { return localStorage.getItem(getKey('task', taskId)) === '1'; }
function setDone(taskId, val) { localStorage.setItem(getKey('task', taskId), val ? '1' : '0'); }
function getNotes(sectionId) { return localStorage.getItem(getKey('notes', sectionId)) || ''; }
function setNotes(sectionId, val) { localStorage.setItem(getKey('notes', sectionId), val); }

// ============================================================
// PLATFORM DETECTION
// ============================================================
function getPlatform(url) {
  if (url.includes('codeforces.com')) return { cls: 'plat-cf', label: 'CF' };
  if (url.includes('leetcode.com')) return { cls: 'plat-lc', label: 'LC' };
  if (url.includes('cses.fi')) return { cls: 'plat-cses', label: 'CSES' };
  if (url.includes('atcoder.jp')) return { cls: 'plat-atcoder', label: 'AT' };
  if (url.includes('spoj.com')) return { cls: 'plat-spoj', label: 'SPOJ' };
  if (url.includes('geeksforgeeks') || url.includes('practice.geeksforgeeks')) return { cls: 'plat-gfg', label: 'GFG' };
  return { cls: 'plat-other', label: 'OJ' };
}

// ============================================================
// RENDER
// ============================================================
function getSectionTaskCount(section) {
  return { total: section.tasks.length, done: section.tasks.filter((t,i) => isDone(section.id + '_' + i)).length };
}

function renderSection(section, phaseId) {
  const { total, done } = getSectionTaskCount(section);
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const notes = getNotes(section.id);

  return `
    <div class="section-card" id="card-${section.id}">
      <div class="section-card-header" onclick="toggleSection('${section.id}')">
        <div class="section-icon ${phaseId}">${section.icon}</div>
        <div class="section-title">${section.title}</div>
        <div class="section-meta">
          <div class="section-progress-bar">
            <div class="section-progress-fill" style="width:${pct}%" id="prog-${section.id}"></div>
          </div>
          <span class="section-count" id="cnt-${section.id}">${done}/${total}</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="section-body">
        ${section.resources.length ? `
        <div class="resources-block">
          <div class="block-label">📚 Resources</div>
          ${section.resources.map(r => `
            <div class="resource-item">
              <span class="resource-bullet">→</span>
              <a class="resource-link" href="${r.url}" target="_blank" rel="noopener">${r.name}</a>
            </div>
          `).join('')}
        </div>` : ''}

        <div class="tasks-block">
          <div class="block-label">✏️ Practice Tasks</div>
          <div class="tasks-grid">
            ${section.tasks.map((t, i) => {
              const taskId = section.id + '_' + i;
              const done = isDone(taskId);
              const plat = getPlatform(t.url);
              return `
                <div class="task-item ${done ? 'done' : ''}" id="taskitem-${taskId}">
                  <div class="task-checkbox" onclick="toggleTask('${section.id}','${taskId}','${phaseId}')">✓</div>
                  <span class="task-label">${t.label}</span>
                  <a class="task-link" href="${t.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${t.url.split('/').slice(-1)[0] || t.url}</a>
                  <span class="task-platform ${plat.cls}">${plat.label}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <div class="notes-block">
          <div class="block-label">📝 Personal Notes</div>
          <textarea 
            class="notes-textarea" 
            id="notes-${section.id}"
            placeholder="Add your notes, key insights, approaches, time taken..."
            onchange="saveNotes('${section.id}')"
            oninput="saveNotes('${section.id}')"
          >${notes}</textarea>
          <div class="notes-saved-indicator" id="notesind-${section.id}">saved</div>
        </div>
      </div>
    </div>
  `;
}

function renderLevel(level, phaseId, levelIdx) {
  const sections = level.sections.map(s => getSectionTaskCount(s));
  const totalT = sections.reduce((a, b) => a + b.total, 0);
  const doneT = sections.reduce((a, b) => a + b.done, 0);
  const pct = totalT > 0 ? Math.round((doneT/totalT)*100) : 0;

  return `
    <div class="level-block" id="level-${phaseId}-${levelIdx}">
      <div class="level-header ${phaseId}">
        <div class="level-number ${phaseId}">LVL ${levelIdx+1}</div>
        <div class="level-info">
          <div class="level-name">${level.name}</div>
          <div class="level-rating">${level.rating}</div>
        </div>
        <div class="level-progress-wrap ${phaseId}">
          <div class="level-progress-bar">
            <div class="level-progress-fill" style="width:${pct}%" id="lvlprog-${phaseId}-${levelIdx}"></div>
          </div>
          <span class="level-progress-text" id="lvlcnt-${phaseId}-${levelIdx}">${doneT}/${totalT}</span>
        </div>
      </div>
      ${level.sections.map(s => renderSection(s, phaseId)).join('')}
    </div>
  `;
}

function renderPhase(phase) {
  const allSections = phase.levels.flatMap(l => l.sections);
  const counts = allSections.map(s => getSectionTaskCount(s));
  const total = counts.reduce((a,b) => a+b.total, 0);
  const done = counts.reduce((a,b) => a+b.done, 0);
  const pct = total > 0 ? Math.round((done/total)*100) : 0;

  return `
    <div class="phase-section ${phase.id === 'p1' ? 'active' : ''}" id="phase-${phase.id}">
      <div class="phase-header">
        <div class="phase-badge ${phase.id}">${phase.name}</div>
        <div class="phase-title">${phase.title}</div>
        <div class="phase-desc">${phase.desc}</div>
      </div>
      
      <div class="overview-bar">
        <div class="overview-card">
          <div class="ov-label">TASKS COMPLETED</div>
          <div class="ov-value ${phase.id}" id="ov-done-${phase.id}">${done}</div>
          <div class="ov-bar"><div class="ov-bar-fill ${phase.id}" style="width:${pct}%" id="ov-bar-${phase.id}"></div></div>
        </div>
        <div class="overview-card">
          <div class="ov-label">TOTAL TASKS</div>
          <div class="ov-value ${phase.id}">${total}</div>
          <div class="ov-bar"><div class="ov-bar-fill ${phase.id}" style="width:100%"></div></div>
        </div>
        <div class="overview-card">
          <div class="ov-label">COMPLETION</div>
          <div class="ov-value ${phase.id}" id="ov-pct-${phase.id}">${pct}%</div>
          <div class="ov-bar"><div class="ov-bar-fill ${phase.id}" style="width:${pct}%" id="ov-pctbar-${phase.id}"></div></div>
        </div>
      </div>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" placeholder="Search sections, topics..." oninput="filterSections(this.value, '${phase.id}')">
      </div>

      <button class="expand-all-btn" onclick="expandAll('${phase.id}')">⊞ Expand all sections</button>

      ${phase.levels.map((l, i) => renderLevel(l, phase.id, i)).join('')}
    </div>
  `;
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = PHASES.map(phase => {
    const colorMap = { p1: 'var(--green)', p2: 'var(--amber)', p3: 'var(--red)' };
    return `
      <div class="sidebar-phase">
        <div class="sidebar-phase-header" onclick="showPhase('${phase.id}')">
          <div class="phase-dot" style="background:${colorMap[phase.id]}"></div>
          ${phase.name}
        </div>
        ${phase.levels.map((level, li) => `
          <div class="sidebar-level-label">${level.name}</div>
          ${level.sections.map(s => {
            const { total, done } = getSectionTaskCount(s);
            return `<a class="sidebar-link" href="#card-${s.id}" onclick="openSection('${s.id}')">
              <span>${s.icon} ${s.title}</span>
              <span class="progress-mini">${done}/${total}</span>
            </a>`;
          }).join('')}
        `).join('')}
      </div>
    `;
  }).join('');
}

// ============================================================
// INTERACTIONS
// ============================================================
function showPhase(phaseId) {
  document.querySelectorAll('.phase-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.phase-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('phase-' + phaseId)?.classList.add('active');
  const tab = Array.from(document.querySelectorAll('.phase-tab')).find(t => t.getAttribute('onclick').includes(phaseId));
  if (tab) tab.classList.add('active');
}

function toggleSection(id) {
  const card = document.getElementById('card-' + id);
  card?.classList.toggle('open');
}

function openSection(id) {
  const card = document.getElementById('card-' + id);
  if (card && !card.classList.contains('open')) {
    card.classList.add('open');
  }
}

function expandAll(phaseId) {
  const phase = document.getElementById('phase-' + phaseId);
  phase?.querySelectorAll('.section-card').forEach(c => c.classList.add('open'));
}

function toggleTask(sectionId, taskId, phaseId) {
  const current = isDone(taskId);
  setDone(taskId, !current);
  
  const item = document.getElementById('taskitem-' + taskId);
  if (item) item.classList.toggle('done', !current);
  
  // Update section progress
  const section = PHASES.flatMap(p => p.levels).flatMap(l => l.sections).find(s => s.id === sectionId);
  if (section) {
    const { total, done } = getSectionTaskCount(section);
    const pct = total > 0 ? Math.round((done/total)*100) : 0;
    const progEl = document.getElementById('prog-' + sectionId);
    const cntEl = document.getElementById('cnt-' + sectionId);
    if (progEl) progEl.style.width = pct + '%';
    if (cntEl) cntEl.textContent = done + '/' + total;
  }
  
  // Update level and phase overview
  updateStats(phaseId);
}

function updateStats(phaseId) {
  const phase = PHASES.find(p => p.id === phaseId);
  if (!phase) return;
  
  const allSections = phase.levels.flatMap(l => l.sections);
  const counts = allSections.map(s => getSectionTaskCount(s));
  const total = counts.reduce((a,b) => a+b.total, 0);
  const done = counts.reduce((a,b) => a+b.done, 0);
  const pct = total > 0 ? Math.round((done/total)*100) : 0;

  const ovDone = document.getElementById('ov-done-' + phaseId);
  const ovPct = document.getElementById('ov-pct-' + phaseId);
  const ovBar = document.getElementById('ov-bar-' + phaseId);
  const ovPctBar = document.getElementById('ov-pctbar-' + phaseId);
  if (ovDone) ovDone.textContent = done;
  if (ovPct) ovPct.textContent = pct + '%';
  if (ovBar) ovBar.style.width = pct + '%';
  if (ovPctBar) ovPctBar.style.width = pct + '%';

  // Update level progress
  phase.levels.forEach((level, li) => {
    const lCounts = level.sections.map(s => getSectionTaskCount(s));
    const lTotal = lCounts.reduce((a,b) => a+b.total, 0);
    const lDone = lCounts.reduce((a,b) => a+b.done, 0);
    const lPct = lTotal > 0 ? Math.round((lDone/lTotal)*100) : 0;
    const lpEl = document.getElementById('lvlprog-' + phaseId + '-' + li);
    const lcEl = document.getElementById('lvlcnt-' + phaseId + '-' + li);
    if (lpEl) lpEl.style.width = lPct + '%';
    if (lcEl) lcEl.textContent = lDone + '/' + lTotal;
  });

  // Global stats
  updateGlobalStats();

  // Sidebar
  renderSidebar();
}

function updateGlobalStats() {
  let total = 0, done = 0;
  PHASES.forEach(p => {
    p.levels.forEach(l => {
      l.sections.forEach(s => {
        const c = getSectionTaskCount(s);
        total += c.total;
        done += c.done;
      });
    });
  });
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = total;
}

let saveTimers = {};
function saveNotes(sectionId) {
  const el = document.getElementById('notes-' + sectionId);
  const ind = document.getElementById('notesind-' + sectionId);
  if (!el) return;
  setNotes(sectionId, el.value);
  if (saveTimers[sectionId]) clearTimeout(saveTimers[sectionId]);
  if (ind) {
    ind.textContent = 'saving...';
    ind.classList.remove('show');
    saveTimers[sectionId] = setTimeout(() => {
      ind.textContent = '✓ saved';
      ind.classList.add('show');
      setTimeout(() => ind.classList.remove('show'), 1500);
    }, 600);
  }
}

function filterSections(query, phaseId) {
  const q = query.toLowerCase();
  const phase = document.getElementById('phase-' + phaseId);
  if (!phase) return;
  phase.querySelectorAll('.section-card').forEach(card => {
    const title = card.querySelector('.section-title')?.textContent.toLowerCase() || '';
    card.style.display = (!q || title.includes(q)) ? '' : 'none';
  });
}

// ============================================================
// INIT
// ============================================================
function init() {
  const main = document.getElementById('main-content');
  main.innerHTML = PHASES.map(p => renderPhase(p)).join('');
  renderSidebar();
  updateGlobalStats();
}

init();
</script>
</body>
</html>
